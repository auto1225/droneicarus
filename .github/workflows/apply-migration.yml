name: Apply Supabase migration (manual)
on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Migration file path under supabase/migrations/'
        required: true
        default: 'supabase/migrations/0014_analytics_page_views.sql'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install pg --no-save
      - env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/apply-migration.mjs ${{ inputs.file }}
