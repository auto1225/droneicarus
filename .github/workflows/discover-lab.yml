name: Discover Lab content (arXiv + GitHub)
on:
  schedule:
    - cron: '0 2 * * *'    # 11:00 KST daily
    - cron: '0 14 * * *'   # 23:00 KST daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run lab discovery (arXiv + GitHub)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/discover-lab.mjs
