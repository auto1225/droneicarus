      <h1>Drone Icarus — Aerial drone footage marketplace</h1>
      <p>Drone Icarus is a map-first marketplace for licensed aerial drone footage. Browse 1,650+ cinematic clips from verified pilots worldwide, sorted by location and category: <strong>Nature</strong> (mountain, ocean, forest, desert, dunes, glacier, waterfall, volcano, aurora), <strong>Cities</strong> (cityscape, bridges, architecture), <strong>Heritage</strong> (ancient ruins, temples, castles), <strong>Action &amp; Sports</strong> (FPV racing, surfing, skiing), <strong>Wildlife</strong>, <strong>Industry &amp; Energy</strong> (wind farms, solar farms), <strong>Warfare &amp; Defense</strong>, and <strong>AI Generated</strong>.</p>
      <p>Each clip ships in three license tiers — Personal, Commercial, Editorial — with one-time payment and perpetual usage rights. Pilots keep 70% of every sale; the platform takes a flat 30% with no subscription.</p>
      <p>Need a custom shot? Post on the <a href="https://droneicarus.com/#commissions">Commissions</a> page and pilots bid in a reverse auction with escrowed payment. Watch live broadcasts and tip pilots via Super Chat on the <a href="https://droneicarus.com/#live">Live</a> page.</p>
