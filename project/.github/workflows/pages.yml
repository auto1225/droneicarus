name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Create index redirect
        run: |
          cat > index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Drone Icarus</title>
          <meta http-equiv="refresh" content="0; url=Drone%20Icarus.html">
          <link rel="canonical" href="Drone%20Icarus.html">
          <p>Redirecting to <a href="Drone%20Icarus.html">Drone Icarus</a>…</p>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
