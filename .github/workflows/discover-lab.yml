name: Discover Lab content (arXiv + GitHub + Patents)
on:
  schedule:
    - cron: '0 2 * * *'    # 11:00 KST daily
    - cron: '0 14 * * *'   # 23:00 KST daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run lab discovery (arXiv + GitHub)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/discover-lab.mjs
      - name: Run learn discovery (YouTube tutorials)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node scripts/discover-learn.mjs
        continue-on-error: true
      - name: Run pulse discovery (RSS feeds)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/discover-pulse.mjs
        continue-on-error: true
      - name: Run patent discovery (Google Patents — global)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/discover-patents.mjs
