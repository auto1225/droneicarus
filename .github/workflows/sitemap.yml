name: Rebuild sitemap
on:
  schedule:
    - cron: '0 3 * * *'   # 12:00 KST daily
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { token: ${{ secrets.GITHUB_TOKEN }} }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Generate sitemap.xml
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/build-sitemap.mjs
      - name: Commit sitemap
        run: |
          git config user.email "auto0104@gmail.com"
          git config user.name "minho via Cowork"
          git add public/sitemap.xml
          git diff --cached --quiet || git commit -m "chore(sitemap): nightly refresh"
          git push || true
      - name: Ping Google + Bing
        run: |
          curl -sI "https://www.google.com/ping?sitemap=https://droneicarus.com/sitemap.xml" | head -1 || true
          curl -sI "https://www.bing.com/ping?sitemap=https://droneicarus.com/sitemap.xml" | head -1 || true
